# yamllint disable rule:line-length
# shellcheck disable=SC2043
---
name: PR Check Build

on:
  pull_request:
    branches:
      - master

jobs:
  check-addon-changes:
    runs-on: ubuntu-latest
    outputs:
      changedAddons: ${{ steps.find_addons.outputs.changed_addons }}
      changedChangelogFiles: ${{ steps.find_changelog.outputs.changed_changelog_files }}
      hasAddonChanges: ${{ steps.find_addons.outputs.has_addon_changes }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch master branch
        run: git fetch origin master

      - name: Find changed addon directories
        id: find_addons
        run: |
          changed_config_files=$(git diff --name-only origin/master "${{ github.sha }}" \
            | grep -E '^[^/]+/config\.(json|ya?ml)$' || true)

          echo "Changed config files:"
          echo "$changed_config_files"

          if [[ -z "$changed_config_files" ]]; then
            echo "No addon changes detected"
            echo "changed_addons=[]" >> "$GITHUB_OUTPUT"
            echo "has_addon_changes=false" >> "$GITHUB_OUTPUT"
          else
            changed_addons=$(echo "$changed_config_files" \
              | awk -F/ '{print $1}' \
              | sort -u \
              | jq -R -s -c 'split("\n")[:-1]')

            echo "Changed addons: $changed_addons"
            echo "changed_addons=$changed_addons" >> "$GITHUB_OUTPUT"
            echo "has_addon_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Find changed changelog files
        id: find_changelog
        run: |
          changed_changelog_files=$(git diff --name-only origin/master "${{ github.sha }}" \
            | grep -iE '^([^/]+/)?changelog\.(md|txt|ya?ml|json)$' || true)
          echo "Changed changelog files:"
          echo "$changed_changelog_files"
          echo "changed_changelog_files=$(echo "$changed_changelog_files" | jq -R -s -c 'split("\n")[:-1]')" >> "$GITHUB_OUTPUT"

  check-changed-changelog:
    name: Check if CHANGELOG.md changed
    needs: check-addon-changes
    if: ${{ needs.check-addon-changes.outputs.hasAddonChanges == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6

      - name: 🔎 Check for updated CHANGELOG.md
        shell: bash
        run: |
          if [[ ! -f "${{ matrix.addon }}/CHANGELOG.md" ]]; then
            echo "No CHANGELOG.md found for ${{ matrix.addon }}, skipping check"
            exit 0
          fi

          # shellcheck disable=SC2076,SC2059
          if [[ ! "${{ needs.check-addon-changes.outputs.changedChangelogFiles }}" =~ "${{ matrix.addon }}/CHANGELOG.md" ]]; then
            echo "::error::No new entries in ${{ matrix.addon }} CHANGELOG.md file!"
            exit 1
          fi

  check-addon-label:
    name: Check for existence of the addon label
    needs: check-addon-changes
    if: ${{ needs.check-addon-changes.outputs.hasAddonChanges == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6

      - name: 🔎 Check if a label for the addon exists
        shell: bash
        run: |
          labeltext=$(grep -E "^\s*${{ matrix.addon }}:" 'paths-filter.yml' || true)
          if [[ -z "$labeltext" ]]; then
            echo "::error::There is no label for this addon! Please add it to paths-filter.yml"
            exit 1
          fi

  addon-linter:
    name: Addon linting
    needs: check-addon-changes
    if: ${{ needs.check-addon-changes.outputs.hasAddonChanges == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6

      - name: 🔎 Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2
        with:
          path: "./${{ matrix.addon }}"

  check-build:
    name: Test addon build (${{ matrix.arch }})
    needs: check-addon-changes
    if: ${{ needs.check-addon-changes.outputs.hasAddonChanges == 'true' }}
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
        arch: [amd64, aarch64]
    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6

      - name: ℹ️ Gather addon info
        id: information
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}/"

      - name: 🗄️ Cache docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/buildx-cache
          key: ${{ runner.os }}-${{ runner.arch }}-buildx-${{ matrix.addon }}-${{ matrix.arch }}-${{ hashFiles(format('{0}/Dockerfile', matrix.addon)) }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildx-${{ matrix.addon }}-${{ matrix.arch }}-

      - name: 🔎 Check if architecture is supported
        id: supported
        shell: bash
        run: |
          if jq -e --arg arch "${{ matrix.arch }}" '.[] | select(. == $arch)' <<< '${{ steps.information.outputs.architectures }}' >/dev/null; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping unsupported architecture: ${{ matrix.arch }}"
          fi

      - name: 🔖 Create addon image tag
        if: ${{ steps.supported.outputs.enabled == 'true' }}
        id: tag
        shell: bash
        run: |
          imagetemplate="${{ steps.information.outputs.image }}"
          version="${{ steps.information.outputs.version }}"
          echo "Using imagetemplate '${imagetemplate}'"
          echo "value=${imagetemplate/\{arch\}/${{ matrix.arch }}}:${version}" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Create addon labels
        if: ${{ steps.supported.outputs.enabled == 'true' }}
        id: labels
        shell: bash
        run: |
          labels="io.hass.version=${{ steps.information.outputs.version }}"
          labels=$(printf '%s' "$labels\nio.hass.name=${{ steps.information.outputs.name }}")
          labels=$(printf '%s' "$labels\nio.hass.description=${{ steps.information.outputs.description }}")
          labels=$(printf '%s' "$labels\nio.hass.type=addon")
          labels=$(printf '%s' "$labels\nio.hass.url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/master/${{ matrix.addon }}")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.title=${{ steps.information.outputs.name }}")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.description=${{ steps.information.outputs.description }}")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.version=${{ steps.information.outputs.version }}")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.authors=Ishioni <ishioni@users.noreply.github.com>")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/master/${{ matrix.addon }}")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.created=$(date -Is)")
          labels=$(printf '%s' "$labels\norg.opencontainers.image.revision=${GITHUB_SHA}")
          labels=$(printf '%s' "$labels\nio.hass.arch=${{ matrix.arch }}")
          echo "value=${labels//$'\n'/'%0A'}" >> "$GITHUB_OUTPUT"

      - name: 🏗️ Set up Docker Buildx
        if: ${{ steps.supported.outputs.enabled == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: 💿 Build Addon
        if: ${{ steps.supported.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.addon }}
          push: false
          load: true
          file: ${{ matrix.addon }}/Dockerfile
          tags: ${{ steps.tag.outputs.value }}
          labels: ${{ steps.labels.outputs.value }}
          cache-from: type=local,src=/tmp/buildx-cache
          cache-to: type=local,dest=/tmp/buildx-cache-new,mode=max

      - name: 🗄️ Update cache Folder
        if: ${{ steps.supported.outputs.enabled == 'true' }}
        run: |
          rm -rf /tmp/buildx-cache
          mv /tmp/buildx-cache-new /tmp/buildx-cache
